name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # Requires a local PC set up as a GitHub Runner
    runs-on: self-hosted 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true # Crucial for 45 vehicle assets

      - name: Build APK (Shipping ASTC)
        # Replaces path with your actual UE5 installation directory
        run: |
          & "C:\Program Files\Epic Games\UE_5.6\Engine\Build\BatchFiles\RunUAT.bat" `
          BuildCookRun `
          -project="${{ github.workspace }}\SpecimenZero.uproject" `
          -platform=Android `
          -cookflavor=ASTC `
          -clientconfig=Shipping `
          -noP4 -cook -allmaps -build -stage -pak -archive `
          -archivedirectory="${{ github.workspace }}\BuildOutput" `
          -Compressed `
          -iterativecooking

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SpecimenZero-Shipping
          path: BuildOutput/Android_ASTC/*.apk
