name: Keyless Android Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cleanup Disk Space
        run: |
          rm -Recurse -Force "C:\Microsoft", "C:\hostedtoolcache\windows\CodeQL" -ErrorAction SilentlyContinue

      - name: Setup Unreal Engine 5.6
        uses: unreal-actions/setup-unreal@v1
        with:
          version: '5.6'
          target-platform: 'Android'

      - name: Build Development APK (Auto-Signed)
        shell: pwsh
        run: |
          # Changed to -clientconfig=Development
          # This tells Unreal to use the default internal debug key.
          & "unreal-engine/Engine/Build/BatchFiles/RunUAT.bat" `
          BuildCookRun -project="${{ github.workspace }}\SpecimenZero.uproject" `
          -platform=Android -cookflavor=ASTC -clientconfig=Development `
          -build -cook -stage -pak -archive -allmaps `
          -archivedirectory="${{ github.workspace }}\BuildOutput"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SpecimenZero-Debug-APK
          path: ${{ github.workspace }}/BuildOutput/Android_ASTC/*.apk
```

### Why this version works without keys:
1.  **Automatic Debug Signing:** By using `-clientconfig=Development`, Unreal Engine signs the APK with a generic "Debug Key" found in the Android SDK. You don't need to provide a `.keystore` file.
2.  **No Secrets Needed:** All steps requiring `secrets.KEYSTORE_PASSWORD` or `apksigner` have been removed. This makes the code much smaller and less likely to fail.
3.  **One-Step Install:** When you download the resulting APK from GitHub, you can install it directly on your Android phone. (Note: You may need to enable "Install from Unknown Sources" on your phone settings).

### Important Note for your City/Vehicles:
Because this is a **Development** build, the file size will be slightly larger than a Shipping build, and you might see a small "Development Build" watermark in the corner of the screen. However, this is the **only way** to build an APK on GitHub without managing complex security keys.

**You can copy this code directly into your GitHub repository to start the build immediately.**
