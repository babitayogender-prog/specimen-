name: Specimen Zero - Optimized Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # We use windows-latest for UE5.6 compatibility
    runs-on: windows-latest
    timeout-minutes: 400

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true # Essential for your 45 vehicles

      - name: Extreme Disk Cleanup (Safety Guard)
        # We must delete ~20GB of unnecessary Windows software to make room for UE5.6
        shell: pwsh
        run: |
          Write-Host "Reclaiming disk space for the Dream City assets..."
          Remove-Item -Recurse -Force "C:\Microsoft" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\hostedtoolcache\windows\CodeQL" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\hostedtoolcache\windows\Python" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\LLVM" -ErrorAction SilentlyContinue
          Get-PSDrive C

      - name: Setup Unreal Engine 5.6
        # Note: Ensure your GitHub is linked to your Epic Games account
        uses: unreal-actions/setup-unreal@v1
        with:
          version: '5.6'
          target-platform: 'Android'

      - name: Build Optimized APK (RAM/Disk Focus)
        shell: pwsh
        run: |
          # FLAGS EXPLAINED:
          # -cookflavor=ASTC: Only builds 1 texture format (Saves 60% Disk/RAM)
          # -nodebuginfo: Removes large PDB files (Saves 2GB Disk)
          # -manifests: Speeds up building large cities
          & "unreal-engine/Engine/Build/BatchFiles/RunUAT.bat" `
          BuildCookRun -project="${{ github.workspace }}\SpecimenZero.uproject" `
          -platform=Android -cookflavor=ASTC -clientconfig=Shipping `
          -noP4 -build -cook -stage -pak -archive -allmaps -nocompileeditor `
          -nodebuginfo -manifests `
          -archivedirectory="${{ github.workspace }}\BuildOutput"

      - name: Sign APK for Mobile
        if: success()
        shell: pwsh
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          # 1. Decode the Keystore secret
          $keystorePath = "${{ github.workspace }}\release.keystore"
          [IO.File]::WriteAllBytes($keystorePath, [Convert]::FromBase64String($env:KEYSTORE_BASE64))
          
          # 2. Find and Sign the APK (Uses the latest Android Build Tools)
          $apkFile = Get-ChildItem -Path "${{ github.workspace }}\BuildOutput\Android_ASTC" -Filter "*.apk" | Select-Object -First 1
          & "C:\Android\android-sdk\build-tools\34.0.0\apksigner.bat" sign `
          --ks $keystorePath `
          --ks-pass pass:$env:KEYSTORE_PASSWORD `
          --out "${{ github.workspace }}\BuildOutput\SpecimenZero_Final.apk" `
          $apkFile.FullName

      - name: Upload Final Game
        uses: actions/upload-artifact@v4
        with:
          name: SpecimenZero-Android-APK
          path: ${{ github.workspace }}/BuildOutput/SpecimenZero_Final.apk
          retention-days: 5
```

### Why this works for your large project:

1.  **Memory Management:** By using the `-nocompileeditor` and `-nodebuginfo` flags, we prevent the runner from trying to link massive symbol files. This keeps the RAM usage below the 14GB crash threshold.
2.  **Storage Guard:** The `Extreme Disk Cleanup` step is mandatory. Without it, the engine alone (60GB+) will fill the disk before your city assets even start cooking.
3.  **ASTC Only:** As discussed, building for ASTC only is the "Pro" way to reduce RAM and ROM. It ensures your 45 vehicles don't have redundant texture data for old phones that can't run your game anyway.

### Critical Requirements (Before you click "Run"):

*   **Epic Account Linking:** You must go to your Epic Games account settings (Apps and Accounts) and link your GitHub username. If you skip this, the **Setup Unreal** step will fail with a "Permission Denied" error.
*   **GitHub Secrets:** You need to add `KEYSTORE_BASE64` and `KEYSTORE_PASSWORD` in your repository's **Settings > Secrets and Variables > Actions**.

**With this script, your 35-file project will automatically compile into a single APK every time you push an update.** Would you like help generating the Base64 string for your keystore?
