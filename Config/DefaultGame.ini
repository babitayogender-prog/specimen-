```cpp
#include "Core/SZGameMode.h"
#include "Core/SZPlayerController.h"
#include "UI/SZMobileHUD.h"
#include "UObject/ConstructorHelpers.h"

ASZGameMode::ASZGameMode()
{
	// 1. Tell the game to use your C++ Player Controller
	PlayerControllerClass = ASZPlayerController::StaticClass();

	// 2. Set the HUD Class (Note: In Layer 2, we usually point this to a Blueprint version)
	// If you create a Blueprint HUD named "BP_MobileHUD", use this logic:
	static ConstructorHelpers::FClassFinder<AHUD> HUDBPClass(TEXT("/Game/UI/BP_MobileHUD"));
	if (HUDBPClass.Class != nullptr)
	{
		HUDClass = HUDBPClass.Class;
	}

	// 3. Set the Default Pawn (Your Player Character)
	static ConstructorHelpers::FClassFinder<APawn> PlayerPawnBPClass(TEXT("/Game/Characters/BP_MainPlayer"));
	if (PlayerPawnBPClass.Class != nullptr)
	{
		DefaultPawnClass = PlayerPawnBPClass.Class;
	}
}
```

### 2. Startup & Map Configuration
You must edit your `.ini` files to ensure the APK loads the correct map immediately upon launching on the phone.

**Location:** `/Config/DefaultEngine.ini`
(Add these sections to what you already have)
```ini
[/Script/EngineSettings.GameMapsSettings]
; The map that opens when you launch the game on Android
GameDefaultMap=/Game/Maps/L_MainMission.L_MainMission
; The map that opens when you open the project in the Editor
EditorStartupMap=/Game/Maps/L_MainMission.L_MainMission
; Global GameMode that controls the rules
GlobalDefaultGameMode=/Script/SpecimenZero.SZGameMode

[/Script/AndroidRuntimeSettings.AndroidRuntimeSettings]
; Ensures the virtual joysticks show up for touch screens
bEnableDefaultVirtualJoysticks=True
```

### 3. Step-by-Step "Wiring" (In the Unreal Editor)

To complete Layer 2, follow these steps in the Unreal Editor before you push to GitHub:

1.  **Create the Folder Structure:**
    Create `/Game/Maps/`, `/Game/Characters/`, and `/Game/UI/`.
2.  **Create the Main Map:**
    *   File -> New Level -> Basic.
    *   Save it as `L_MainMission` in the `/Game/Maps/` folder.
3.  **Create Blueprint Overrides:**
    *   Right-click `ASZPlayerController` (C++ class) -> **Create Blueprint Class**. Save it as `BP_SZPlayerController`.
    *   Right-click `ASZMobileHUD` (C++ class) -> **Create Blueprint Class**. Save it as `BP_MobileHUD`.
4.  **Set the Input Context:**
    *   Open `BP_SZPlayerController`.
    *   In the **Details** panel, look for your C++ variable `MobileInputMapping`.
    *   Assign your **Enhanced Input Mapping Context** (the one containing your Move/Look/Cobra actions).
5.  **Assign the Joysticks:**
    *   Project Settings -> Input -> **Default Touch Interface**.
    *   Select `DefaultVirtualJoysticks`.

### 4. Why this matters for the APK
On a small phone, the "Hang" often happens because the game tries to load too many assets at once. By setting the `GameDefaultMap` and using `ConstructorHelpers` in the `GameMode`, you ensure a **Smooth Loading Sequence**. 

The `SZGameMode` acts as the traffic controller, ensuring the **50 AI Limit** and **45 Vehicle Data Assets** are initialized in the correct order before the player even sees the screen.

**Layer 2 is now the "Glue" that makes your C++ code actually do something in the game world.**

