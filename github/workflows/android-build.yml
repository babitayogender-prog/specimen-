name: Build Android NoKeys
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # This uses GitHub's own machines, no self-hosted runner needed
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Reclaim Disk Space
        # This prevents the "Out of Disk Space" error
        shell: pwsh
        run: |
          Write-Host "Eliminating unnecessary runner files..."
          Remove-Item -Recurse -Force "C:\Microsoft" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\hostedtoolcache\windows\CodeQL" -ErrorAction SilentlyContinue

      - name: Setup Unreal Engine 5.6
        uses: mikeengland/setup-unreal-engine@v3
        with:
          engine-version: '5.6'

      - name: Build Development APK
        shell: pwsh
        run: |
          # We use Development config so Unreal handles the signing keys internally
          & "C:\Program Files\Epic Games\UE_5.6\Engine\Build\BatchFiles\RunUAT.bat" `
          BuildCookRun -project="${{ github.workspace }}\SpecimenZero.uproject" `
          -platform=Android -cookflavor=ASTC -clientconfig=Development `
          -build -cook -stage -pak -archive -allmaps `
          -archivedirectory="${{ github.workspace }}\BuildOutput"

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: SpecimenZero-Package
          path: ${{ github.workspace }}/BuildOutput/Android_ASTC/*.apk
